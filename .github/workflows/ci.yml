name: CI

on:
  push:
    branches: ["**"]
  pull_request:
  schedule:
    - cron: "37 3 * * 3"  # Every Wednesday at 03:37 UTC

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync
      - run: make test
